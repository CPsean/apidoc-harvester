# ── Site config TEMPLATE — copy to config/<site>.yaml and fill in ────────────
# The code in harvester/ is generic; everything site-specific lives here.
# See config/fadada.yaml for a complete, working example.

site: CHANGE_ME
base_url: https://docs.example.com

# ── Acquisition: cheapest strategy that works wins (tried in `order`) ─────────
acquire:
  order: [content_api, js_bundle, static_html, rendered]
  # BEST: a direct content endpoint. Discover ONCE via browser Network tab
  # (see runbook/LOOP.md). Then the whole pipeline is plain HTTP — no browser.
  content_api:
    enabled: false
    # Template uses any page key. {doc_id} aliases page.doc_id|id (single-id sites);
    # multi-id sites can reference several keys, e.g. {nodeId}/{articleId}.
    url_template: "https://docs.example.com/api/doc/{doc_id}"
    method: GET
    response_format: json           # json | html | markdown
    content_pointer: "data.content" # dotted path into the JSON response
    content_is: html                # html | markdown
    headers: {}                     # optional site request headers, e.g.
                                    #   {X-Requested-With: XMLHttpRequest} if the
                                    #   gateway 403s plain requests. Values may embed
                                    #   ${ENV_VAR} — resolved from the environment at
                                    #   fetch time (missing var = hard error naming it;
                                    #   resolved values are never printed), e.g.
                                    #   {Cookie: "${SITE_COOKIE}"} for login-walled docs
    # body_template:                # optional JSON body when method is POST/PUT.
    #   articleId: "{articleId}"    #   string values get {page-field} templating like
    #   token: "${SITE_TOKEN}"      #   url_template, plus ${ENV_VAR} interpolation.
    #                               #   Sent as Content-Type: application/json.
  static_html:                      # FALLBACK 1: pre-downloaded HTML files
    enabled: false
    html_root: ".."                 # relative to the project root
  js_bundle:                        # FALLBACK: static extraction from downloaded SPA bundles
    enabled: false                  # no JS execution; requires explicit extraction rules
    bundle_urls: []                 # url or local file, relative to project root
    # record_regex must expose named groups: id, content; title is optional
    record_regex: ""
    # Alternative: object_regex + field names below
    object_regex: ""
    id_field: id
    title_field: title
    content_field: html
    page_id_field: doc_id           # page key to match; falls back to doc_id then id
    content_is: html                # html | markdown
    # cache_dir: "out/CHANGE_ME/_bundle_cache"
    #                               # where downloaded bundles are cached (default:
    #                               #   out/<site>/_bundle_cache; local files not cached)
  rendered:                         # FALLBACK 2: headless render (needs playwright)
    enabled: false
    url_template: "https://docs.example.com/doc/{doc_id}"
    wait_selector: ".article-body"

# ── Optional HTML preprocessing before convert/extract ──────────────────────
preprocess:
  table_normalizer:
    enabled: false                  # opt-in; normalizes colspan/parentid tree tables
    # nesting_mode: parentid         # parentid (default) | data_level
    # level_attr: data-level         # used when nesting_mode: data_level
    indent_unit: 4
    toggle_attr: onclick
    parentid_attr: parentid
    id_attr: id
    # row_id_regex: "toggle\\s*\\([^,]+,\\s*['\"]?([^,'\")]+)"
    #                               # how to pull a row's id out of `toggle_attr` when
    #                               #   the <tr> has no id attribute (group 1 = id)
    skip_patterns: []               # regexes; matching tables are left untouched

# ── Where title / time / body live in a page's HTML ──────────────────────────
selectors:
  title: ".article-title"
  time:  ".article-time"            # optional; "" if none
  body:  ".article-body"

# ── How an API page lays out path / method / param tables ────────────────────
structure:
  path_regex: '(?:请求地址|Endpoint|Path)[:：]\s*([^\s<）)]+)'
  # strip_domain: true              # opt-in: if path_regex captures a full URL,
                                    #   emit only its path for OpenAPI
  method_regex: '(?:请求方式|Method)[:：]\s*(GET|POST|PUT|DELETE|PATCH)'
  request_section:  ["请求参数", "Request Parameters", "Parameters"]
  response_section: ["响应结果", "响应参数", "Response", "Returns"]
  example_request_section:  ["请求示例", "Request Example"]
  example_response_section: ["响应示例", "Response Example"]
  required_true_values: ["是", "Y", "true", "Required", "必填"]
  columns: {name: 0, type: 1, required: 2, desc: 3}
  #                                 # `required` may be omitted (3-column docs, e.g.
  #                                 #   {name: 0, type: 1, desc: 2}): all fields are
  #                                 #   then emitted as optional
  # request_columns:  {name: 0, type: 1, required: 2, desc: 3}
  # response_columns: {name: 0, type: 1, desc: 2}
  #                                 # Optional overrides when request/response tables
  #                                 # use different column layouts.
  nested_indent_unit: 4
  # nest_prefix: "+"                # optional: each leading '+' on a field name = one
  #                                 #   nesting level (some sites mark children this
  #                                 #   way instead of indenting). Unset = indent-only.
  # section_match: exact            # exact (default: == / startswith) | regex — with
  #                                 #   regex every *_section marker is an re.search
  #                                 #   pattern, e.g. '^\d+[.、]?\s*请求参数'

# ── Pages to harvest (static_html needs `file`; api strategies need `doc_id`) ─
# Optional generated page lists. Explicit `pages` below override generated ids.
# pages_from_manifest: "html/docs/_manifest.json"   # bare path, or the full form:
# pages_from_manifest:
#   path: "html/docs/_manifest.json"
#   items_key: "pages"              # name the list field explicitly; omitted = probe
#                                   #   pages/items/docs/data, else treat dict as id->item
#   id_field: id                    # manifest field -> page id
#   title_field: title              # manifest field -> page title
#   file_field: file                # manifest field -> page file (static_html)
#   doc_id_field: doc_id            # manifest field -> page doc_id (api strategies)
#   api_default: true               # `api:` for generated pages without their own
#   non_api_ids: []                 # ids forced to api: false (overviews etc.)
# pages_from_dir:
#   path: "html/docs"               # directory to scan
#   pattern: ".html"                # filename suffix filter
#   recursive: true
#   file_base: "html"               # page `file` is made relative to this (default:
#                                   #   acquire.static_html.html_root)
#   title_selector: "h1"            # CSS selector for the title (default: selectors.title)
#   api_default: true
#   non_api_ids: []
# pages_from_tree:                  # remote tree/menu API -> reviewable sidecar.
#   url: "https://docs.example.com/api/doc/tree"
#   headers: {}                     #   ${ENV_VAR} supported, like content_api
#   root_pointer: "data.nodes"      #   dotted path to the top-level node list
#   children_pointer: "children"    #   field holding child nodes (recursed)
#   leaf_only: true                 #   only nodes without children become pages
#   page_fields: {nodeId: "id", title: "name", articleId: "articleId"}
#                                   #   page-key <- tree-field; map a STABLE tree id
#                                   #   onto `id` (ordinal fallback shifts on inserts)
#   api_default: true
#   non_api_ids: []
#   # Run `python run.py config/<site>.yaml --sync-pages` to (re)generate
#   # config/<site>.pages.yaml; normal runs only read that file and NEVER hit
#   # the tree API. Review the sidecar's git diff before harvesting.
pages:
  - {id: "01", title: "Overview", doc_id: "OVERVIEW_ID", api: false}
  - {id: "02", title: "Create thing", doc_id: "DOC_ID_1"}

# ── OpenAPI emission ─────────────────────────────────────────────────────────
openapi:
  title: "Example API"
  version: "1.0"
  default_method: POST
  servers:
    - url: "https://{host}"
      variables: {host: {default: "api.example.com"}}
  envelope: {code: code, msg: msg, data: data}
  security_headers: []              # e.g. [{key: ApiKey, name: X-Api-Key, desc: "..."}]

# ── Output locations (relative to project root) ──────────────────────────────
output:
  markdown_dir: "out/CHANGE_ME/markdown"
  models_json:  "out/CHANGE_ME/models.json"
  openapi:      "out/CHANGE_ME/openapi.yaml"
  report:       "out/CHANGE_ME/checks-report.json"
  # repair_fences: false           # true: when a page's markdown has an odd number of
  #                                #   ``` fences (broken source doc), append a closing
  #                                #   fence and record a warn "fence repaired: <file>"
  #                                #   instead of failing checks. Off = surface as fail.
golden_dir: "golden/CHANGE_ME"
